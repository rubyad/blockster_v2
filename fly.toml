# fly.toml app configuration file generated for blockster-v2
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'blockster-v2'
primary_region = 'ord'
kill_signal = 'SIGTERM'

[build]

[deploy]
  release_command = '/app/bin/migrate'

[env]
  PHX_HOST = 'blockster.com'
  PORT = '8080'
  DNS_CLUSTER_QUERY = 'blockster-v2.internal'

[mounts]
  source = 'mnesia_data'
  destination = '/data'
  # The Web3Auth JWT signing key lives at /data/web3auth/signing_key.json
  # inside this same volume — Fly volumes cannot nest, so a separate
  # volume mounted at /data/web3auth would conflict with this mount.
  # On first deploy: flyctl ssh console -> mkdir -p /data/web3auth ->
  # paste signing_key.json contents -> chmod 600. Set
  # WEB3AUTH_JWT_SIGNING_KEY_PATH=/data/web3auth/signing_key.json in fly secrets.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  size = 'performance-2x'
  memory = '4gb'
  cpus = 2
